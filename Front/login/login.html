<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | TrackFocus</title>
    <link rel="stylesheet" href="../src/tailwindcss/output.css">
</head>
<body class="bg-bright dark:bg-dark text-dark dark:text-bright">
    <section class="w-full h-full p-4">
        <div class="w-full flex justify-between items-center mb-24">
            <img src="../src/imgs/template-logo.png" alt="Logo TrackFocus" class="w-15">

            <span class="text-4xl">TrackFocus.</span>
        </div>

        <section class="w-full">
            <h1 class="text-5xl/15 max-w-[75%] mb-4">Faça agora seu login!</h1>
            <p class="dark:text-aux-text-dark">Novo por aqui?/ <a class="dark:text-bright">Crie uma conta</a>.</p>

            <form action="#" class="mt-8">
                <input placeholder="Nome ou Email" type="text" name="email" id="" class="p-4 w-full rounded-md mb-2 dark:bg-darker dark:focus:bg-dark focus:outline-main-100 focus:outline-2">
                <input placeholder="Senha" type="password" name="senha" id="" class="p-4 w-full rounded-md mb-4 dark:bg-darker dark:focus:bg-dark focus:outline-main-100 focus:outline-2">

                <p class="dark:text-aux-text-dark mb-8">Esqueceu sua senha?/ <a class="dark:text-bright">Resetar senha</a>.</p>

                <button type="submit" class="w-full p-4 bg-main-100 transition-all active:-translate-y-1 active:bg-main-200">Login</button>
            </form>
        </section>
    </section>
</body>
</html>
